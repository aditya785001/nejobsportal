<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a6b3c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f4a2a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e07b00;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)" />

  <!-- Decorative circles -->
  <circle cx="100" cy="100" r="200" fill="#ffffff" opacity="0.03" />
  <circle cx="1100" cy="500" r="300" fill="#ffffff" opacity="0.03" />
  <circle cx="600" cy="315" r="400" fill="#ffffff" opacity="0.02" />

  <!-- Subtle pattern overlay -->
  <rect x="0" y="0" width="1200" height="630" fill="url(#pattern)" opacity="0.05" />

  <!-- Brand name -->
  <text x="80" y="200" font-family="Inter, Arial, sans-serif" font-size="72" font-weight="800" fill="#ffffff">
    NE<tspan fill="#e07b00">Jobs</tspan>Portal<tspan font-size="36" fill="#9ca3af">.in</tspan>
  </text>

  <!-- Tagline -->
  <text x="80" y="280" font-family="Inter, Arial, sans-serif" font-size="36" font-weight="500" fill="#d1d5db">
    Your Career Gateway to Northeast India
  </text>

  <!-- Divider line -->
  <rect x="80" y="320" width="200" height="4" rx="2" fill="url(#accent)" />

  <!-- Description -->
  <text x="80" y="380" font-family="Inter, Arial, sans-serif" font-size="24" fill="#9ca3af">
    Free job alerts · Exam results · Admissions · Scholarships
  </text>
  <text x="80" y="420" font-family="Inter, Arial, sans-serif" font-size="22" fill="#6b8f7a">
    Assam · Arunachal · Manipur · Meghalaya · Mizoram · Nagaland · Sikkim · Tripura
  </text>

  <!-- Stat boxes -->
  <g transform="translate(80, 470)">
    <rect x="0" y="0" width="160" height="70" rx="10" fill="#ffffff" opacity="0.08" />
    <text x="80" y="32" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700" fill="#ffffff" text-anchor="middle">8 States</text>
    <text x="80" y="55" font-family="Inter, Arial, sans-serif" font-size="14" fill="#9ca3af" text-anchor="middle">Northeast Coverage</text>
  </g>
  <g transform="translate(260, 470)">
    <rect x="0" y="0" width="200" height="70" rx="10" fill="#ffffff" opacity="0.08" />
    <text x="100" y="32" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700" fill="#ffffff" text-anchor="middle">100% Free</text>
    <text x="100" y="55" font-family="Inter, Arial, sans-serif" font-size="14" fill="#9ca3af" text-anchor="middle">No Hidden Charges</text>
  </g>
  <g transform="translate(480, 470)">
    <rect x="0" y="0" width="220" height="70" rx="10" fill="#ffffff" opacity="0.08" />
    <text x="110" y="32" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700" fill="#ffffff" text-anchor="middle">Daily Updates</text>
    <text x="110" y="55" font-family="Inter, Arial, sans-serif" font-size="14" fill="#9ca3af" text-anchor="middle">Jobs, Results &amp; More</text>
  </g>

  <!-- Footer text -->
  <text x="80" y="590" font-family="Inter, Arial, sans-serif" font-size="16" fill="#4a7a5e">nejobsportal.in</text>
</svg>
